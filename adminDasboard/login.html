<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin HMIF</title>
    <link rel="stylesheet" href="style-login.css" />
  </head>
  <body>
    <div class="login-card">
      <h2>Login Admin HMIF</h2>
      <div style="text-align: center; margin-bottom: 15px">
        <a
          href="../src/index.html"
          style="text-decoration: none; color: #007bff; font-size: 14px"
          >← Kembali ke Website Utama</a
        >
      </div>
      <div id="errorMessage" class="error">Username atau password salah!</div>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
    </div>
    <script src="../adminDasboard/login.js"></script>
  </body>
</html>
