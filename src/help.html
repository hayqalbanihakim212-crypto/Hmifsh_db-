  </head>

        <div class="collapse navbar-collapse" id="navbarNav">

            <li class="nav-item">

            <li class="nav-item">

          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card p-4 shadow-sm">
            <h2 class="text-success mb-3">Form Pengajuan Kasus</h2>
            <p class="text-muted mb-4">
              Silakan laporkan kendala akademik atau masalah lainnya melalui
              form ini.
            </p>
            <form id="helpForm">
              <div class="mb-3">
                <input
                  class="form-control"
                  type="text"
                  id="identitas"
                  placeholder="Nama / Identitas"
                  required
                  minlength="3"
                  maxlength="50"
                />
              </div>
              <div class="mb-3">
                <input
                  class="form-control"
                  type="text"
                  id="nim"
                  placeholder="NIM (Hanya Angka)"
                  required
                  pattern="[0-9]{8,15}"
                  title="NIM harus berupa angka (8-15 digit)"
                />
              </div>
              <div class="mb-3">
                <input
                  class="form-control"
                  type="tel"
                  id="kontak"
                  placeholder="Kontak (WA: 08... atau +62...)"
                  required
                  pattern="^(08|\+62)[0-9]{8,13}$"
                  title="Nomor harus diawali 08 atau +62 (10-15 digit)"
                />
              </div>

              <div class="mb-3">
                <select class="form-select" id="fakultas" required>
                  <option value="" disabled selected>Pilih Fakultas</option>
                  <option value="Syari'ah dan Hukum">Syari'ah dan Hukum</option>
                </select>
              </div>
              <div class="mb-3">
                <select class="form-select" id="jurusan" required>
                  <option value="" disabled selected>
                    Pilih Jurusan/Prodi
                  </option>
                  <option value="Hukum Keluarga Islam">
                    Hukum Keluarga Islam
                  </option>
                  <option value="Hukum Ekonomi Syariah">
                    Hukum Ekonomi Syariah
                  </option>
                  <option value="Hukum Pidana Islam">Hukum Pidana Islam</option>
                  <option value="Hukum Tata Negara">Hukum Tata Negara</option>
                  <option value="Perbandingan Mazhab">
                    Perbandingan Mazhab
                  </option>
                </select>
              </div>

              <div class="mb-3">
                <input
                  class="form-control"
                  type="text"
                  id="subject"
                  placeholder="Subject"
                  required
                  maxlength="100"
                />
              </div>
              <div class="mb-3">
                <textarea
                  class="form-control"
                  id="description"
                  rows="4"
                  placeholder="Deskripsi Lengkap"
                  required
                ></textarea>
              </div>
              <div class="mb-3">
                <label for="bukti" class="form-label"
                  >Upload Bukti (Foto/Video/Dokumen):</label
                >
                <input
                  class="form-control"
                  type="file"
                  id="bukti"
                  accept="image/*,video/*,.pdf,.doc,.docx"
                  required
                />
              </div>
              <div id="preview" class="mb-3"></div>
              <button type="submit" class="btn btn-success w-100">
                Kirim Laporan
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-body-tertiary py-4 mt-5">
